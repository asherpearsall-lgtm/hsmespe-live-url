<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HSMESPE App Resolver</title>
  <link rel="icon" href="pwa/icon-192.png">
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #f7f8ed; color: #15201c; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { width: min(720px, 100%); background: #fff; border: 1px solid #d8dfdb; border-radius: 12px; box-shadow: 0 18px 44px rgba(21,32,28,.12); padding: 24px; }
    img { width: 58px; height: 58px; }
    h1 { margin: 14px 0 6px; font-size: 28px; }
    p { line-height: 1.5; color: #55635f; }
    a { color: #1d6f2b; font-weight: 700; }
    code { background: #eef4ed; border-radius: 6px; padding: 2px 5px; }
    .status { border-top: 1px solid #e5ebe8; margin-top: 18px; padding-top: 14px; }
    form { display: grid; gap: 12px; margin-top: 18px; padding-top: 18px; border-top: 1px solid #e5ebe8; }
    label { display: grid; gap: 6px; font-weight: 700; }
    input { min-height: 42px; border: 1px solid #cddad5; border-radius: 8px; padding: 10px 12px; font: inherit; }
    button { min-height: 44px; border: 0; border-radius: 8px; color: #fff; background: linear-gradient(135deg, #13824f, #082b20); font: inherit; font-weight: 800; cursor: pointer; }
    button:disabled { opacity: .65; cursor: wait; }
  </style>
</head>
<body>
  <main>
    <img src="pwa/icon-192.png" alt="HS Irrigation logo">
    <h1>HSMESPE App</h1>
    <p>Current build: <code>V3.31.7 GitHub Security Hardening Build</code></p>
    <p><a id="openApp" href="current.json">Open current app</a></p>
    <div id="status" class="status">Enter your username and app password to continue.</div>
    <form id="unlockForm" autocomplete="off">
      <label>
        Username
        <input id="unlockUsername" autocomplete="off">
      </label>
      <label>
        App password
        <input id="unlockPassword" type="password" autocomplete="off">
      </label>
      <button id="unlockButton" type="submit">Unlock Encrypted App Bundle</button>
      <div id="unlockStatus" class="status">Ready to connect to the current app.</div>
    </form>
  </main>
  <script src="github-private-unlock.js"></script>
  <script>
    function safeHttpUrl(value) {
      try {
        const parsed = new URL(String(value || ''), window.location.href);
        if (parsed.protocol === 'https:' || parsed.protocol === 'http:') return parsed.href;
      } catch (error) {
        return '';
      }
      return '';
    }
    let currentAppUrl = '';
    async function loadCurrentAppUrl() {
      const response = await fetch('current.json', {cache: 'no-store'});
      if (!response.ok) throw new Error('current link unavailable');
      const payload = await response.json();
      const appUrl = safeHttpUrl(payload.app_url || payload.current_url || '');
      if (!appUrl) throw new Error('current link unavailable');
      currentAppUrl = appUrl;
      document.getElementById('openApp').href = appUrl;
      document.getElementById('status').textContent = 'Current app link ready.';
      return appUrl;
    }
    loadCurrentAppUrl().catch(() => {
      document.getElementById('status').textContent = 'Current app link unavailable. Start the Windows host and try again.';
    });
    function submitHostLogin(appUrl, username, password) {
      const origin = new URL(appUrl).origin;
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = `${origin}/login/github-handoff`;
      form.style.display = 'none';
      for (const [name, value] of Object.entries({
        username,
        password,
        remember: 'true',
        next_url: '/app?source=github'
      })) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = name;
        input.value = value;
        form.appendChild(input);
      }
      document.body.appendChild(form);
      form.submit();
    }
    document.getElementById('unlockForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = document.getElementById('unlockButton');
      const status = document.getElementById('unlockStatus');
      button.disabled = true;
      status.textContent = 'Connecting to the current app...';
      try {
        const username = document.getElementById('unlockUsername').value;
        const password = document.getElementById('unlockPassword').value;
        if (!username.trim() || !password) throw new Error('Username and app password are required.');
        const appUrl = currentAppUrl || await loadCurrentAppUrl();
        submitHostLogin(appUrl, username, password);
      } catch (error) {
        status.textContent = error && error.message ? error.message : String(error);
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
